<style>
  :root { --verde:#2d6a4f; --verde2:#1b4332; }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body { margin:0; font-family: -apple-system, Segoe UI, Roboto, Arial, sans-serif;
         background:#eef2f1; color:#1c2321; }
  header { background:var(--verde); color:#fff; padding:14px 16px;
           position:sticky; top:0; z-index:5; }
  header h1 { margin:0; font-size:18px; font-weight:700; }
  header .act { font-size:11px; opacity:.85; margin-top:2px; }
  .wrap { max-width:760px; margin:0 auto; padding:14px; }

  /* pantalla de PIN */
  #login { max-width:340px; margin:12vh auto 0; text-align:center; padding:0 18px; }
  #login .logo { width:104px; height:104px; margin:0 auto 14px;
                 border-radius:22px; box-shadow:0 2px 8px rgba(0,0,0,.12); }
  #login .logo svg { width:100%; height:100%; display:block; border-radius:22px; }
  #login h2 { margin:0 0 4px; font-size:20px; }
  #login p { margin:0 0 20px; color:#5a6a63; font-size:14px; }
  input[type=password], input[type=tel] {
    width:100%; padding:14px; font-size:20px; text-align:center; letter-spacing:4px;
    border:1px solid #c3d0cb; border-radius:12px; background:#fff; }
  button { cursor:pointer; border:none; border-radius:12px; font-size:16px;
           font-weight:700; padding:14px; width:100%; margin-top:12px;
           background:var(--verde); color:#fff; }
  button:active { background:var(--verde2); }
  .msg { color:#b41e1e; font-size:14px; min-height:20px; margin-top:12px; }

  /* pestañas */
  .tabs { display:flex; gap:6px; margin-bottom:12px; flex-wrap:wrap; }
  .tabs button { background:#dbe5e1; color:var(--verde2); flex:1 1 auto;
                 font-size:14px; padding:10px 8px; }
  .tabs button.on { background:var(--verde); color:#fff; }
  .tabs button.salir { background:#e6d3d3; color:#8a1e1e; flex:0 0 auto; }
  select#ccSel { width:100%; padding:11px; font-size:15px; background:#fff;
                 border:1px solid #c3d0cb; border-radius:10px; margin-bottom:10px; }
  .ccley { font-weight:700; font-size:15px; padding:6px 4px 12px; }
  .ccley.debe { color:#b41e1e; } .ccley.favor { color:#147838; }
  .ccley.aldia { color:#1b4332; }
  td.num.rojo { color:#b41e1e; } td.num.verde { color:#147838; }

  /* tarjetas de alquileres */
  .card { background:#fff; border-radius:12px; padding:12px 14px; margin-bottom:10px;
          border-left:6px solid #9bb; box-shadow:0 1px 2px rgba(0,0,0,.06); }
  .card.ok { border-left-color:#2e9e5b; }
  .card.previo { border-left-color:#e0a92e; }
  .card.vencido { border-left-color:#e8702a; }
  .card.mora { border-left-color:#c0362c; }
  .card .top { display:flex; justify-content:space-between; align-items:baseline; }
  .card .baulera { font-weight:800; font-size:16px; }
  .card .precio { font-weight:700; color:var(--verde2); }
  .card .cli { margin:2px 0 6px; font-size:15px; }
  .card .linea { font-size:13px; color:#4a574f; }
  .card .linea.aviso { color:#a15c00; font-weight:600; }
  .pill { display:inline-block; font-size:12px; font-weight:700; padding:2px 8px;
          border-radius:20px; color:#fff; }
  .pill.ok { background:#2e9e5b; } .pill.previo { background:#c78a12; }
  .pill.vencido { background:#e8702a; } .pill.mora { background:#c0362c; }
  a.tel { color:var(--verde); text-decoration:none; font-weight:600; }
  .acc { margin-top:8px; display:flex; gap:8px; }
  .acc a { text-decoration:none; font-weight:700; font-size:13px; padding:7px 14px;
           border-radius:18px; color:#fff; }
  .acc a.call { background:#4a6b8a; }
  .acc a.wa { background:#25d366; }

  /* tabla de cobros */
  table { width:100%; border-collapse:collapse; background:#fff; border-radius:12px;
          overflow:hidden; font-size:13px; }
  th, td { padding:8px 10px; text-align:left; border-bottom:1px solid #edf1ef; }
  th { background:#dbe5e1; color:var(--verde2); font-size:12px; }
  td.num { text-align:right; white-space:nowrap; }
  .foot { text-align:center; color:#7a8781; font-size:12px; margin:16px 0 8px; }
  .barra { display:flex; gap:8px; margin-bottom:10px; }
  .barra button { background:#dbe5e1; color:var(--verde2); font-size:13px; padding:9px; }
  .hidden { display:none; }
  .vacio { text-align:center; color:#7a8781; padding:26px; }
</style>
</head>
<body>

<script>
  // Pegá acá la URL de la Web App (la que termina en /exec).
  var API_URL = "https://script.google.com/macros/s/AKfycbzU7q0ZXRUW1jL17IEP5bj-jualTxTpcpxuk6PftOPrXy2xain_bf5XLrnmm6-cGAjEZg/exec";
</script>

  <h2>Mi Espacio Bauleras</h2>
  <p>Ingresá el PIN para ver los alquileres.</p>
  <input id="pin" type="password" inputmode="numeric" placeholder="PIN de 8 dígitos"
         autocomplete="off" maxlength="8" pattern="[0-9]*"
         oninput="this.value=this.value.replace(/\D/g,'')"
         onkeydown="if(event.key==='Enter')entrar()">
  <button onclick="entrar()">Entrar</button>
  <div class="msg" id="msg"></div>
</div>

<!-- panel de datos -->
<div id="app" class="hidden">
  <header>
    <h1>Mi Espacio Bauleras</h1>
    <div class="act" id="act"></div>
  </header>
  <div class="wrap">
    <div class="tabs">
      <button id="tabA" class="on" onclick="ver('A')">Alquileres</button>
      <button id="tabCC" onclick="ver('CC')">Ctas Ctes</button>
      <button id="tabC" onclick="ver('C')">Cobros</button>
      <button class="salir" onclick="salir()">Salir</button>
    </div>
    <div id="vistaA"></div>
    <div id="vistaCC" class="hidden"></div>
    <div id="vistaC" class="hidden"></div>
    <div class="foot">Datos privados · protegidos por PIN</div>
  </div>
</div>

<script>
  var DATOS = null;

  function entrar() {
    var pin = document.getElementById("pin").value.trim();
    if (!pin) { return; }
    document.getElementById("msg").textContent = "Verificando…";
    pedir(pin);
  }

  function pedir(pin) {
    if (API_URL.indexOf("PEGAR") >= 0 || API_URL.indexOf("/exec") < 0) {
      document.getElementById("msg").textContent =
        "Falta configurar la URL de la Web App en el archivo.";
      return;
    }
    window.__cb = function (data) { recibir(pin, data); };
    var s = document.createElement("script");
    s.src = API_URL + "?pin=" + encodeURIComponent(pin) +
            "&callback=__cb&t=" + Date.now();
    s.onerror = function () {
      document.getElementById("msg").textContent = "No se pudo conectar.";
    };
    document.body.appendChild(s);
    setTimeout(function () { if (s.parentNode) { s.parentNode.removeChild(s); } }, 100);
  }

  function recibir(pin, data) {
    if (!data || data.error) {
      document.getElementById("msg").textContent =
        (data && data.error) ? data.error : "Error al conectar.";
      localStorage.removeItem("bauleras_pin");
      return;
    }
    localStorage.setItem("bauleras_pin", pin);
    DATOS = data;
    document.getElementById("login").classList.add("hidden");
    document.getElementById("app").classList.remove("hidden");
    document.getElementById("act").textContent =
      data.actualizado ? ("Actualizado: " + data.actualizado) : "";
    pintarAlquileres();
    pintarCtaCte();
    pintarCobros();
  }

  function recargar() {
    var pin = localStorage.getItem("bauleras_pin");
    if (pin) { pedir(pin); }
  }

  function salir() {
    localStorage.removeItem("bauleras_pin");
    DATOS = null;
    document.getElementById("app").classList.add("hidden");
    document.getElementById("login").classList.remove("hidden");
    document.getElementById("pin").value = "";
    document.getElementById("msg").textContent = "";
  }

  function ver(cual) {
    ["A", "CC", "C"].forEach(function (t) {
      document.getElementById("tab" + t).classList.toggle("on", cual === t);
      document.getElementById("vista" + t).classList.toggle("hidden", cual !== t);
    });
  }

  function fmt(n) {
    n = Math.round(Number(n) || 0);
    return String(n).replace(/\B(?=(\d{3})+(?!\d))/g, ".");
  }

  function textoDias(d, etapa) {
    if (d === "" || d === null || d === undefined) { return ""; }
    d = Number(d);
    if (d === 0) { return "vence hoy"; }
    if (d > 0) { return "vence en " + d + " día" + (d === 1 ? "" : "s"); }
    return "vencida hace " + (-d) + " día" + (d === -1 ? "" : "s");
  }
  var ETIQ = { ok:"Al día", previo:"Por vencer", vencido:"Vencida", mora:"En mora" };

  function pintarAlquileres() {
    var cont = document.getElementById("vistaA");
    var a = DATOS.alquileres || [];
    if (!a.length) { cont.innerHTML = '<div class="vacio">Sin alquileres activos.</div>'; return; }
    var html = "";
    for (var i = 0; i < a.length; i++) {
      var x = a[i];
      var tel = String(x.telefono || "").replace(/[^\d+]/g, "");
      var acc = "";
      if (tel) {
        acc += '<a class="call" href="tel:' + tel + '">📞 Llamar</a>';
      }
      if (x.wa) {
        acc += '<a class="wa" target="_blank" rel="noopener" href="https://wa.me/' +
               x.wa + '?text=' + encodeURIComponent(x.mensaje || "") + '">💬 WhatsApp</a>';
      }
      var avisoLinea = "";
      if (x.etapa !== "ok" && x.avisoFecha) {
        avisoLinea = '<div class="linea aviso">✉️ Último aviso: ' +
          (ETIQ[x.avisoTipo] || esc(x.avisoTipo)) + ' · ' + esc(x.avisoFecha) +
          '</div>';
      }
      html +=
        '<div class="card ' + x.etapa + '">' +
          '<div class="top"><span class="baulera">Baulera ' + esc(x.baulera) + '</span>' +
            '<span class="precio">$ ' + fmt(x.precio) + '</span></div>' +
          '<div class="cli">' + esc(x.cliente) + '</div>' +
          (x.inicio ? '<div class="linea">Inicio: ' + esc(x.inicio) + '</div>' : '') +
          '<div class="linea">Vence: ' + esc(x.vencimiento) + ' · ' +
            '<span class="pill ' + x.etapa + '">' + ETIQ[x.etapa] + '</span> ' +
            textoDias(x.dias, x.etapa) + '</div>' +
          avisoLinea +
          (tel ? '<div class="linea">📞 ' + esc(x.telefono) + '</div>' : '') +
          (acc ? '<div class="acc">' + acc + '</div>' : '') +
        '</div>';
    }
    cont.innerHTML = html;
  }

  function pintarCobros() {
    var cont = document.getElementById("vistaC");
    var k = DATOS.cobros || [];
    if (!k.length) { cont.innerHTML = '<div class="vacio">Sin cobros registrados.</div>'; return; }
    var html = '<table><tr><th>Fecha</th><th>Cliente</th><th>Baul.</th>' +
               '<th class="num">Total</th><th>Medio</th></tr>';
    for (var i = 0; i < k.length; i++) {
      var c = k[i];
      html += '<tr><td>' + esc(c.fecha) + '</td><td>' + esc(c.cliente) + '</td>' +
              '<td>' + esc(c.baulera) + '</td>' +
              '<td class="num">$ ' + fmt(c.total) + '</td>' +
              '<td>' + esc(c.medio) + '</td></tr>';
    }
    html += "</table>";
    cont.innerHTML = html;
  }

  function pintarCtaCte() {
    var cont = document.getElementById("vistaCC");
    var res = DATOS.ctacteResumen || [];
    if (!res.length) {
      cont.innerHTML = '<div class="vacio">Sin cuentas corrientes.</div>';
      return;
    }
    var opts = res.map(function (r, i) {
      return '<option value="' + i + '">' + esc(r.cliente) + '</option>';
    }).join("");
    cont.innerHTML =
      '<select id="ccSel" onchange="ccRender()">' + opts + '</select>' +
      '<div id="ccLey" class="ccley"></div><div id="ccTab"></div>';
    ccRender();
  }

  function money(n) {
    n = Math.round(Number(n) || 0);
    return (n < 0 ? "-$ " : "$ ") + fmt(Math.abs(n));
  }

  function ccRender() {
    var i = parseInt(document.getElementById("ccSel").value, 10) || 0;
    var r = DATOS.ctacteResumen[i];
    var ley = document.getElementById("ccLey");
    ley.textContent = r.leyenda;
    ley.className = "ccley " + (r.saldo > 0 ? "debe" : r.saldo < 0 ? "favor" : "aldia");
    var movs = (DATOS.ctacteMovs || []).filter(function (m) {
      return m.cliente === r.cliente;
    });
    var html = '<table><tr><th>Fecha</th><th>Concepto</th>' +
               '<th class="num">Débito</th><th class="num">Crédito</th>' +
               '<th class="num">Saldo</th></tr>';
    for (var j = 0; j < movs.length; j++) {
      var m = movs[j];
      var cls = m.saldo > 0 ? "rojo" : m.saldo < 0 ? "verde" : "";
      html += '<tr><td>' + esc(m.fecha) + '</td><td>' + esc(m.concepto) + '</td>' +
              '<td class="num">' + (m.debito ? money(m.debito) : "") + '</td>' +
              '<td class="num">' + (m.credito ? money(m.credito) : "") + '</td>' +
              '<td class="num ' + cls + '">' + money(m.saldo) + '</td></tr>';
    }
    html += "</table>";
    document.getElementById("ccTab").innerHTML = html;
  }

  function esc(s) {
    return String(s === null || s === undefined ? "" : s)
      .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
  }

  // reingreso automático si ya se validó antes en este teléfono
  (function () {
    var pin = localStorage.getItem("bauleras_pin");
    if (pin) { pedir(pin); }
  })();
</script>
</body>
</html>
